<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e11d48"/>
      <stop offset="50%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#ffa726"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="200" fill="#e11d48" opacity="0.06"/>
  <circle cx="1100" cy="100" r="250" fill="#fb7185" opacity="0.05"/>
  <circle cx="600" cy="315" r="350" fill="#e11d48" opacity="0.03"/>
  
  <!-- Border accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Logo icon (brain) -->
  <rect x="520" y="160" width="60" height="60" rx="12" fill="#e11d48"/>
  <text x="550" y="200" text-anchor="middle" font-family="sans-serif" font-size="30" fill="white">🧠</text>
  
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="56" font-weight="800" fill="white" dx="40">
    Note<tspan fill="#fb7185">Minds</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" fill="#9496a1">
    AI-powered Study Assistant
  </text>
  
  <!-- Divider -->
  <rect x="450" y="300" width="300" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Features -->
  <text x="600" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#e4e5e9">
    📄 Upload tài liệu  •  🧠 Sơ đồ tư duy  •  📇 Flashcard  •  💬 Chat AI
  </text>
  
  <!-- Supported formats -->
  <text x="600" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#9496a1">
    Hỗ trợ PDF, DOCX, PPTX, XLSX, CSV, TXT, Markdown
  </text>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#fb7185">
    loveyuna.today
  </text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
