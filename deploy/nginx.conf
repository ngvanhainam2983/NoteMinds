# Nginx for split-domain deployment
# - Frontend: https://notemind.tech
# - API: https://api.notemind.tech

upstream notemind_backend {
    server backend:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name notemind.tech www.notemind.tech api.notemind.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend domain
server {
    listen 443 ssl http2;
    server_name notemind.tech www.notemind.tech;

    ssl_certificate /etc/letsencrypt/live/notemind.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notemind.tech/privkey.pem;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_pass http://notemind_backend;
    }
}

# API domain
server {
    listen 443 ssl http2;
    server_name api.notemind.tech;

    ssl_certificate /etc/letsencrypt/live/notemind.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notemind.tech/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 50m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_pass http://notemind_backend;
    }
}
