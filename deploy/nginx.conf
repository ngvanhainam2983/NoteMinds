# Nginx for split-domain deployment
# - Frontend: https://notemind.tech
# - API: https://api.notemind.tech

upstream notemind_backend {
    server backend:3001;
    keepalive 32;
}

# Basic request limiting zones (effective inside API server block)
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=10r/m;

server {
    listen 80;
    server_name notemind.tech www.notemind.tech api.notemind.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Drop common exploit probes and file disclosure attempts
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|wordpress|setup/setup\.php|app_dev\.php|down\.html|scripts/(deploy|db)\.sh|key\.pem|backup/database\.zip|install\.sql)$ {
        return 444;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|ini|log|sql|bak|old|swp|pem|sh)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend domain
server {
    listen 443 ssl http2;
    server_name notemind.tech www.notemind.tech;

    ssl_certificate /etc/letsencrypt/live/notemind.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notemind.tech/privkey.pem;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Drop common exploit probes and file disclosure attempts
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|wordpress|setup/setup\.php|app_dev\.php|down\.html|scripts/(deploy|db)\.sh|key\.pem|backup/database\.zip|install\.sql)$ {
        return 444;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|ini|log|sql|bak|old|swp|pem|sh)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_pass http://notemind_backend;
    }
}

# API domain
server {
    listen 443 ssl http2;
    server_name api.notemind.tech;

    ssl_certificate /etc/letsencrypt/live/notemind.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notemind.tech/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 50m;

    # Drop common exploit probes and file disclosure attempts
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|wordpress|setup/setup\.php|app_dev\.php|down\.html|scripts/(deploy|db)\.sh|key\.pem|backup/database\.zip|install\.sql)$ {
        return 444;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|ini|log|sql|bak|old|swp|pem|sh)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    # Strict limit for auth endpoints
    location ~* ^/auth/(login|register|forgot-password|reset-password)$ {
        limit_req zone=auth_per_ip burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_pass http://notemind_backend;
    }

    location / {
        limit_req zone=api_per_ip burst=120 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_pass http://notemind_backend;
    }
}
